<!DOCTYPE html>
<html>
<head>
    <title>Mazda 3D + Voice</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="m-0 p-0">
    <div id="root"></div>
    <script>
        const { useState, useRef, useEffect } = React;

        class ThreeJSScene {
            constructor(canvasElement) {
                this.canvas = canvasElement;
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xd4d4d8);

                const width = this.canvas.clientWidth;
                const height = this.canvas.clientHeight;

                this.camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 10000);
                this.camera.position.set(0, 200, 300);
                this.camera.lookAt(0, 20, 0);

                this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
                this.renderer.setSize(width, height);

                const light = new THREE.AmbientLight(0xffffff, 0.7);
                this.scene.add(light);

                const positions = [-350, -250, -150, -50, 50, 150, 250, 350];
                const geometry = new THREE.BoxGeometry(60, 40, 120);
                this.cars = [];

                positions.forEach((x, idx) => {
                    const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                    const mesh = new THREE.Mesh(geometry, mat);
                    mesh.position.set(x, 20, 0);
                    mesh.userData = { index: idx };
                    this.scene.add(mesh);
                    this.cars.push(mesh);
                });

                this.animate();
            }

            updateHighlight(indices) {
                this.cars.forEach(car => {
                    if (indices.includes(car.userData.index)) {
                        car.material.emissive.setHex(0xffaa00);
                        car.material.emissiveIntensity = 0.5;
                        car.scale.set(1.15, 1.15, 1.15);
                    } else {
                        car.material.emissive.setHex(0x000000);
                        car.material.emissiveIntensity = 0;
                        car.scale.set(1, 1, 1);
                    }
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.renderer.render(this.scene, this.camera);
            }
        }

        function App() {
            const canvasRef = useRef(null);
            const threeRef = useRef(null);
            const [messages, setMessages] = useState(['Ready! Click mic to test voice.']);
            const [isListening, setIsListening] = useState(false);

            useEffect(() => {
                if (canvasRef.current) {
                    threeRef.current = new ThreeJSScene(canvasRef.current);
                }
            }, []);

            const handleMic = async () => {
                setIsListening(true);
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                if (!SpeechRecognition) {
                    setMessages(p => [...p, 'ERROR: Speech Recognition not supported']);
                    setIsListening(false);
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                let finalTranscript = '';

                recognition.onresult = (e) => {
                    for (let i = e.resultIndex; i < e.results.length; i++) {
                        if (e.results[i].isFinal) {
                            finalTranscript += e.results[i][0].transcript;
                        }
                    }
                };

                recognition.onend = async () => {
                    setIsListening(false);
                    if (finalTranscript) {
                        setMessages(p => [...p, `You: ${finalTranscript}`]);

                        try {
                            const res = await fetch('/api/gemini', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userInput: finalTranscript })
                            });

                            const data = await res.json();
                            if (data.error) {
                                setMessages(p => [...p, `API Error: ${data.error}`]);
                            } else {
                                setMessages(p => [...p, `AI: ${data.text}`]);
                                // Highlight cars 0 and 7 for demo
                                threeRef.current.updateHighlight([0, 7]);
                                setMessages(p => [...p, '✨ Highlighted cars 1 and 8']);
                            }
                        } catch (err) {
                            setMessages(p => [...p, `Fetch Error: ${err.message}`]);
                        }
                    }
                };

                recognition.onerror = (e) => {
                    setMessages(p => [...p, `Speech Error: ${e.error}`]);
                    setIsListening(false);
                };

                recognition.start();
            };

            return React.createElement(
                'div',
                { className: 'w-screen h-screen flex flex-col bg-gray-900' },
                // Header
                React.createElement('div', { className: 'bg-black text-white p-4' },
                    React.createElement('h1', { className: 'text-2xl font-bold mb-2' }, 'Mazda 3D Explorer + Voice')
                ),
                // Main content
                React.createElement(
                    'div',
                    { className: 'flex flex-1 gap-4 p-4 overflow-hidden' },
                    // Canvas - 2/3 width
                    React.createElement(
                        'div',
                        { className: 'w-2/3 bg-white rounded shadow' },
                        React.createElement('canvas', { ref: canvasRef, style: { display: 'block', width: '100%', height: '100%' } })
                    ),
                    // Chat - 1/3 width
                    React.createElement(
                        'div',
                        { className: 'w-1/3 bg-white rounded shadow flex flex-col' },
                        React.createElement('div', { className: 'bg-blue-600 text-white p-3 font-bold' }, 'Chat'),
                        React.createElement('div', { className: 'flex-1 overflow-y-auto p-3 bg-gray-50 text-sm space-y-2 border-b' },
                            messages.map((msg, i) => React.createElement('div', { key: i, className: 'text-gray-800' }, msg))
                        ),
                        React.createElement('div', { className: 'p-3' },
                            React.createElement('button', {
                                onClick: handleMic,
                                disabled: isListening,
                                className: `w-full py-2 px-4 rounded font-bold text-white ${isListening ? 'bg-red-600' : 'bg-green-600 hover:bg-green-700'}`
                            }, isListening ? '🎤 Listening...' : '🎤 Click to Speak')
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
