<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazda - Find Your Perfect Vehicle</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 via-gray-50 to-gray-100 overflow-hidden">
    <div id="root"></div>

    <script>
        function startApp() {
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                setTimeout(startApp, 100);
                return;
            }

            const { useState, useRef, useEffect, useMemo } = React;

            // SVG Icons
            const MazdaLogo = () => React.createElement('svg', { className: 'w-8 h-8 text-white', viewBox: '0 0 24 24', fill: 'currentColor' },
                React.createElement('path', { d: 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z' })
            );

            const Send = () => React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M13 5l7 7m0 0l-7 7m7-7H6' })
            );

            const Mic = () => React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 14.828v-6.656M9 4a3 3 0 116 0H9zm6 14.04c2.062-.694 3.521-2.227 3.521-3.978 0-1.29-.552-2.458-1.415-3.28M4 12h16' })
            );

            const MapPin = () => React.createElement('svg', { className: 'w-4 h-4', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z' }),
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M15 11a3 3 0 11-6 0 3 3 0 016 0z' })
            );

            const Search = () => React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' })
            );

            const Spark = () => React.createElement('svg', { className: 'w-4 h-4', fill: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { d: 'M13 2L3 14h9l-1 8 10-12h-9l1-8z' })
            );

            // Vehicle Data
            const VEHICLES = [
                { id: 1, name: 'MAZDA3\nHATCHBACK', shortName: 'Mazda3', price: 25650, category: 'Cars', color: 'red', width: '90px', xPos: '2%' },
                { id: 2, name: 'MAZDA3\nSEDAN', shortName: 'Mazda3', price: 26150, category: 'Cars', color: 'gray', width: '90px', xPos: '12%' },
                { id: 3, name: 'MX-5\nMIATA', shortName: 'MX-5', price: 30430, category: 'Cars', color: 'red', width: '90px', xPos: '22%' },
                { id: 4, name: 'CX-30', shortName: 'CX-30', price: 28500, category: 'SUVs', color: 'gray', width: '100px', xPos: '35%' },
                { id: 5, name: 'CX-5', shortName: 'CX-5', price: 31000, category: 'SUVs', color: 'white', width: '120px', xPos: '48%' },
                { id: 6, name: 'CX-50', shortName: 'CX-50', price: 34750, category: 'SUVs', color: 'white', width: '120px', xPos: '62%' },
                { id: 7, name: 'CX-70', shortName: 'CX-70', price: 42750, category: 'SUVs', color: 'gray', width: '130px', xPos: '76%' },
                { id: 8, name: 'CX-90', shortName: 'CX-90', price: 50695, category: 'SUVs', color: 'red', width: '130px', xPos: '90%' },
            ];

            const QUICK_REPLIES = [
                { text: 'I would love some help finding the right car.', category: null },
                { text: 'Show me sporty, fun cars', category: 'Cars' },
                { text: 'I need a spacious family SUV', category: 'SUVs' },
                { text: 'What\'s the most affordable Mazda?', category: null },
            ];

            function MazdaShowcase() {
                const [chatMessages, setChatMessages] = useState([
                    { role: 'assistant', text: 'Welcome to Mazda. Do you know which model you would like to explore or would like help finding the right Mazda driving experience for you?' }
                ]);
                const [inputValue, setInputValue] = useState('');
                const [selectedVehicle, setSelectedVehicle] = useState(null);
                const [isAnalyzing, setIsAnalyzing] = useState(false);
                const chatEndRef = useRef(null);

                useEffect(() => {
                    if (chatEndRef.current) {
                        chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                    }
                }, [chatMessages]);

                const handleQuickReply = (reply) => {
                    setChatMessages(prev => [...prev, { role: 'user', text: reply.text }]);
                    setIsAnalyzing(true);

                    setTimeout(() => {
                        if (reply.category === 'Cars') {
                            setSelectedVehicle(['Mazda3', 'MX-5']);
                            setChatMessages(prev => [...prev, {
                                role: 'assistant',
                                text: 'Great! I\'ve highlighted our fun and sporty cars. The Mazda3 offers premium cabin feel with agile handling, while the MX-5 Miata is the ultimate lightweight driving experience.'
                            }]);
                        } else if (reply.category === 'SUVs') {
                            setSelectedVehicle(['CX-5', 'CX-90']);
                            setChatMessages(prev => [...prev, {
                                role: 'assistant',
                                text: 'Perfect! The CX-5 is our all-new redesigned crossover with Google Built-In, and the CX-90 PHEV is our premium 3-row family vehicle with room for everyone.'
                            }]);
                        } else {
                            setSelectedVehicle(['Mazda3']);
                            setChatMessages(prev => [...prev, {
                                role: 'assistant',
                                text: 'The Mazda3 Hatchback at $25,650 is our most affordable model. It combines premium cabin design with practical everyday driving.'
                            }]);
                        }
                        setIsAnalyzing(false);
                    }, 1200);
                };

                const handleSubmit = () => {
                    if (!inputValue.trim()) return;
                    handleQuickReply({ text: inputValue, category: null });
                    setInputValue('');
                };

                return React.createElement(
                    'div',
                    { className: 'w-screen h-screen flex overflow-hidden' },
                    // Header
                    React.createElement(
                        'div',
                        { className: 'fixed top-0 w-full z-50 bg-black/30 backdrop-blur-sm border-b border-white/10' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between px-8 py-4' },
                            // Left Nav
                            React.createElement(
                                'div',
                                { className: 'flex items-center gap-8' },
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'VEHICLES'),
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'SHOPPING TOOLS'),
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'WHAT DRIVES US')
                            ),
                            // Center Logo
                            React.createElement(
                                'div',
                                { className: 'absolute left-1/2 transform -translate-x-1/2' },
                                React.createElement('div', { className: 'w-8 h-8 border-2 border-white rounded-full' })
                            ),
                            // Right Nav
                            React.createElement(
                                'div',
                                { className: 'flex items-center gap-6' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-2 text-white text-sm' },
                                    React.createElement(MapPin, null),
                                    React.createElement('span', null, '92602')
                                ),
                                React.createElement('button', { className: 'px-4 py-1.5 border border-white text-white text-xs font-light hover:bg-white hover:text-black transition-colors' }, 'View Inventory'),
                                React.createElement('button', { className: 'px-4 py-1.5 bg-white text-black text-xs font-semibold hover:bg-gray-200 transition-colors' }, 'Build Yours'),
                                React.createElement('button', { className: 'text-white hover:text-gray-300' }, React.createElement(Search, null))
                            )
                        )
                    ),
                    // Main Content
                    React.createElement(
                        'div',
                        { className: 'flex w-full h-full pt-20' },
                        // Left Chat Panel
                        React.createElement(
                            'div',
                            { className: 'w-80 bg-black/40 backdrop-blur-md p-8 flex flex-col overflow-y-auto' },
                            // Chat Messages
                            React.createElement(
                                'div',
                                { className: 'flex-1 space-y-4 mb-6' },
                                chatMessages.map((msg, idx) =>
                                    React.createElement(
                                        'div',
                                        { key: idx, className: `${msg.role === 'user' ? 'text-right' : 'text-left'}` },
                                        React.createElement(
                                            'div',
                                            { className: `inline-block max-w-xs px-4 py-3 rounded-lg text-sm ${msg.role === 'user' ? 'bg-red-600 text-white' : 'bg-gray-400 text-gray-900'}` },
                                            msg.text
                                        )
                                    )
                                ),
                                isAnalyzing && React.createElement(
                                    'div',
                                    { className: 'flex gap-2 items-center' },
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce' }),
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce', style: { animationDelay: '0.1s' } }),
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce', style: { animationDelay: '0.2s' } })
                                ),
                                React.createElement('div', { ref: chatEndRef })
                            ),
                            // Quick Replies
                            React.createElement(
                                'div',
                                { className: 'space-y-2 mb-4' },
                                QUICK_REPLIES.map((reply, idx) =>
                                    React.createElement(
                                        'button',
                                        {
                                            key: idx,
                                            onClick: () => handleQuickReply(reply),
                                            disabled: isAnalyzing,
                                            className: 'w-full text-left px-4 py-3 bg-gray-400 text-gray-900 text-sm rounded hover:bg-gray-300 transition-colors disabled:opacity-50 font-light'
                                        },
                                        reply.text
                                    )
                                )
                            ),
                            // Input
                            React.createElement(
                                'div',
                                { className: 'flex gap-2 items-center bg-gray-400 px-4 py-3 rounded' },
                                React.createElement(Spark, null),
                                React.createElement(
                                    'input',
                                    {
                                        type: 'text',
                                        value: inputValue,
                                        onChange: e => setInputValue(e.target.value),
                                        onKeyPress: e => e.key === 'Enter' && handleSubmit(),
                                        placeholder: 'Ask anything',
                                        className: 'flex-1 bg-transparent text-gray-900 placeholder-gray-600 outline-none text-sm'
                                    }
                                ),
                                React.createElement('button', { onClick: handleSubmit, className: 'text-gray-600 hover:text-gray-900' }, React.createElement(Mic, null))
                            )
                        ),
                        // Right Vehicle Showcase
                        React.createElement(
                            'div',
                            { className: 'flex-1 bg-gradient-to-b from-gray-200/50 to-gray-300/50 relative flex items-center justify-center px-16' },
                            // Vehicle Display Area
                            React.createElement(
                                'div',
                                { className: 'relative w-full h-96 flex items-end justify-center gap-4' },
                                VEHICLES.map(vehicle =>
                                    React.createElement(
                                        'div',
                                        {
                                            key: vehicle.id,
                                            className: `flex flex-col items-center transition-all duration-300 cursor-pointer ${
                                                selectedVehicle?.includes(vehicle.shortName) ? 'opacity-100' : 'opacity-30 blur-sm'
                                            }`,
                                            onClick: () => setSelectedVehicle([vehicle.shortName])
                                        },
                                        React.createElement(
                                            'div',
                                            { className: `${vehicle.color === 'red' ? 'bg-red-500' : vehicle.color === 'white' ? 'bg-white' : 'bg-gray-400'} rounded-full mb-2`, style: { width: vehicle.width, height: '140px' } }
                                        ),
                                        React.createElement(
                                            'div',
                                            { className: 'text-center text-gray-900 text-xs font-light tracking-wider whitespace-pre-line' },
                                            vehicle.name
                                        )
                                    )
                                )
                            ),
                            // Info Display
                            selectedVehicle && React.createElement(
                                'div',
                                { className: 'absolute bottom-8 left-8 bg-white/90 backdrop-blur-sm px-6 py-4 rounded text-gray-900 max-w-xs' },
                                React.createElement('p', { className: 'text-sm font-light' },
                                    `Starting at $${VEHICLES.find(v => v.shortName === selectedVehicle[0])?.price.toLocaleString()}`
                                )
                            )
                        )
                    )
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(MazdaShowcase));
        }

        startApp();
    </script>
</body>
</html>
