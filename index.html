<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazda - Find Your Perfect Vehicle</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 via-gray-50 to-gray-100 overflow-hidden">
    <div id="root"></div>

    <script>
        function startApp() {
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                setTimeout(startApp, 100);
                return;
            }

            const { useState, useRef, useEffect, useMemo } = React;

            const GEMINI_API_KEY = 'AIzaSyART6Jhz9ALb7h8PuEUCVOaBNRJhy-qU_k';
            const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

            // SVG Icons
            const Mic = (props) => React.createElement('svg', { ...props, fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4' })
            );

            const MapPin = () => React.createElement('svg', { className: 'w-4 h-4', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z' }),
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M15 11a3 3 0 11-6 0 3 3 0 016 0z' })
            );

            const Search = () => React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' })
            );

            const Stop = () => React.createElement('svg', { className: 'w-6 h-6', fill: 'currentColor', viewBox: '0 0 24 24' },
                React.createElement('rect', { x: '6', y: '6', width: '12', height: '12', rx: '2' })
            );

            // Vehicle Data
            const VEHICLES = [
                { id: 1, name: 'MAZDA3\nHATCHBACK', shortName: 'Mazda3 Hatchback', displayName: 'Mazda3 Hatchback', price: 25650, keywords: ['hatchback', 'compact', 'affordable', 'fun', 'agile', 'urban', 'budget', 'economical', 'practical', 'commute'] },
                { id: 2, name: 'MAZDA3\nSEDAN', shortName: 'Mazda3 Sedan', displayName: 'Mazda3 Sedan', price: 26150, keywords: ['sedan', 'compact', 'affordable', 'practical', 'commute', 'daily', 'economical', 'family', 'professional'] },
                { id: 3, name: 'MX-5\nMIATA', shortName: 'MX-5 Miata', displayName: 'MX-5 Miata', price: 30430, keywords: ['miata', 'roadster', 'convertible', 'sports', 'fun', 'lightweight', 'performance', 'weekend', 'affordable', 'sporty', 'thrilling', 'joy'] },
                { id: 4, name: 'CX-30', shortName: 'CX-30', displayName: 'CX-30', price: 28500, keywords: ['cx-30', 'crossover', 'compact', 'affordable', 'practical', 'suv', 'versatile', 'young', 'active'] },
                { id: 5, name: 'CX-5', shortName: 'CX-5', displayName: 'CX-5', price: 31000, keywords: ['cx-5', 'crossover', 'suv', 'family', 'spacious', 'practical', 'google', 'redesigned', 'new', 'reliable', 'comfortable', 'everyday'] },
                { id: 6, name: 'CX-50', shortName: 'CX-50', displayName: 'CX-50 Hybrid', price: 34750, keywords: ['cx-50', 'hybrid', 'efficient', 'outdoor', 'rugged', 'fuel economy', 'eco-friendly', 'all-wheel-drive', 'adventure', 'range', 'off-road', 'capabilities'] },
                { id: 7, name: 'CX-70', shortName: 'CX-70', displayName: 'CX-70', price: 42750, keywords: ['cx-70', 'performance', 'luxury', 'powerful', 'cargo', 'sporty', 'turbo', 'premium', 'hp', 'high-performance', 'powerful', 'fun'] },
                { id: 8, name: 'CX-90', shortName: 'CX-90', displayName: 'CX-90 PHEV', price: 50695, keywords: ['cx-90', 'phev', 'family', '3-row', 'seats', 'luxury', 'spacious', 'electric', 'hybrid', 'premium', 'large', 'children', 'passengers'] },
            ];

            const GUIDANCE_PROMPTS = [
                { text: 'I want something fun and affordable', category: 'fun' },
                { text: 'I need a spacious family vehicle', category: 'family' },
                { text: 'Show me eco-friendly options', category: 'eco' },
                { text: 'I want a luxury performance car', category: 'performance' },
            ];

            async function callGeminiAPI(userInput) {
                const vehicleList = VEHICLES.map(v => `- ${v.displayName} ($${v.price.toLocaleString()})`).join('\n');

                const systemPrompt = `You are a Mazda vehicle recommendation assistant. Based on what the customer wants, recommend the BEST 1-2 Mazda models.

Available vehicles: Mazda3 Hatchback, Mazda3 Sedan, MX-5 Miata, CX-30, CX-5, CX-50 Hybrid, CX-70, CX-90 PHEV

IMPORTANT FORMAT - End every response with:
VEHICLES: [exact vehicle name], [exact vehicle name]

Example: "Perfect! The CX-5 is spacious and practical. VEHICLES: CX-5"

Be brief and friendly (1-2 sentences before VEHICLES line).`;

                try {
                    console.log('Sending to Gemini API:', userInput);

                    const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `${systemPrompt}\n\nCustomer: "${userInput}"`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    console.log('Full API response:', JSON.stringify(data, null, 2));

                    if (!response.ok || data.error) {
                        const errorMsg = data.error?.message || `API error: ${response.status}`;
                        console.error('API Error:', errorMsg);
                        throw new Error(errorMsg);
                    }

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    console.log('Extracted text:', text);

                    if (!text) {
                        throw new Error('No response from API');
                    }

                    return text;
                } catch (error) {
                    console.error('Gemini API error:', error.message);
                    alert(`API Error: ${error.message}\n\nCheck browser console (F12) for details.`);
                    return 'I apologize for the error. Please check the console (F12) for details. VEHICLES: CX-5';
                }
            }

            function extractVehicleNames(geminiResponse) {
                const vehiclesMatch = geminiResponse.match(/VEHICLES:\s*(.+?)(?:\n|$)/i);
                if (!vehiclesMatch) {
                    console.warn('No VEHICLES: tag found in response');
                    return [];
                }

                const vehicleNames = vehiclesMatch[1].split(',').map(name => name.trim());
                const matchedVehicles = [];

                vehicleNames.forEach(name => {
                    const foundVehicle = VEHICLES.find(v =>
                        v.displayName.toLowerCase().includes(name.toLowerCase()) ||
                        name.toLowerCase().includes(v.shortName.toLowerCase()) ||
                        name.toLowerCase().includes(v.displayName.split(' ')[0].toLowerCase())
                    );
                    if (foundVehicle) {
                        matchedVehicles.push(foundVehicle.displayName);
                    }
                });

                console.log('Extracted vehicles:', matchedVehicles);
                return matchedVehicles;
            }

            function MazdaShowcase() {
                const [chatMessages, setChatMessages] = useState([
                    { role: 'assistant', text: 'Welcome to Mazda! I\'m here to help you find the perfect vehicle.' },
                    { role: 'assistant', text: 'Tell me about your lifestyle, what matters to you, or what kind of driving experience you\'re looking for. Click the microphone and start speaking!' }
                ]);
                const [selectedVehicles, setSelectedVehicles] = useState([]);
                const [isListening, setIsListening] = useState(false);
                const [isProcessing, setIsProcessing] = useState(false);
                const [transcript, setTranscript] = useState('');
                const [displayMode, setDisplayMode] = useState('blur');  // 'blur', 'carousel', 'card-highlight', 'animated-focus'
                const recognitionRef = useRef(null);
                const synthRef = useRef(window.speechSynthesis);
                const chatEndRef = useRef(null);
                const transcriptRef = useRef('');  // Track final transcript

                useEffect(() => {
                    if (chatEndRef.current) {
                        chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                    }
                }, [chatMessages]);

                // Initialize Web Speech API
                useEffect(() => {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SpeechRecognition) {
                        console.error('Speech Recognition not supported');
                        return;
                    }

                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = true;
                    recognition.lang = 'en-US';

                    recognition.onstart = () => {
                        setIsListening(true);
                        setTranscript('');
                    };

                    recognition.onresult = (event) => {
                        let interim = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const trans = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                interim += trans + ' ';
                            }
                        }
                        if (interim) {
                            setTranscript(interim);
                            transcriptRef.current = interim;  // Store in ref
                        }
                    };

                    recognition.onend = async () => {
                        setIsListening(false);
                        if (transcriptRef.current.trim()) {
                            await processUserInput(transcriptRef.current.trim());
                            transcriptRef.current = '';  // Clear after processing
                        }
                    };

                    recognition.onerror = (event) => {
                        console.error('Speech recognition error:', event.error);
                        setIsListening(false);
                    };

                    recognitionRef.current = recognition;
                }, []);

                const processUserInput = async (userText) => {
                    setIsProcessing(true);
                    setChatMessages(prev => [...prev, { role: 'user', text: userText }]);

                    const geminiResponse = await callGeminiAPI(userText);
                    const vehicleNames = extractVehicleNames(geminiResponse);

                    console.log('Vehicle names extracted:', vehicleNames);

                    if (vehicleNames.length > 0) {
                        setSelectedVehicles(vehicleNames);
                    }

                    const mainResponse = geminiResponse.split('VEHICLES:')[0].trim();
                    setChatMessages(prev => [...prev, { role: 'assistant', text: mainResponse }]);

                    speakResponse(mainResponse);
                    setTranscript('');
                    setIsProcessing(false);
                };

                const speakResponse = (text) => {
                    if (synthRef.current.speaking) {
                        synthRef.current.cancel();
                    }

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;
                    synthRef.current.speak(utterance);
                };

                const toggleListening = () => {
                    if (isListening) {
                        recognitionRef.current?.stop();
                    } else {
                        setTranscript('');
                        recognitionRef.current?.start();
                    }
                };

                const handleGuidanceClick = (prompt) => {
                    setTranscript(prompt.text);
                    setTimeout(() => processUserInput(prompt.text), 100);
                };

                return React.createElement(
                    'div',
                    { className: 'w-screen h-screen flex overflow-hidden' },
                    // Header
                    React.createElement(
                        'div',
                        { className: 'fixed top-0 w-full z-50 bg-black/30 backdrop-blur-sm border-b border-white/10' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between px-8 py-4' },
                            React.createElement(
                                'div',
                                { className: 'flex items-center gap-8' },
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'VEHICLES'),
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'SHOPPING TOOLS'),
                                React.createElement('div', { className: 'text-white text-xs font-light tracking-widest' }, 'WHAT DRIVES US')
                            ),
                            React.createElement(
                                'div',
                                { className: 'absolute left-1/2 transform -translate-x-1/2' },
                                React.createElement('div', { className: 'w-8 h-8 border-2 border-white rounded-full' })
                            ),
                            React.createElement(
                                'div',
                                { className: 'flex items-center gap-6' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-2 text-white text-sm' },
                                    React.createElement(MapPin, null),
                                    React.createElement('span', null, '92602')
                                ),
                                React.createElement('button', { className: 'px-4 py-1.5 border border-white text-white text-xs font-light hover:bg-white hover:text-black transition-colors' }, 'View Inventory'),
                                React.createElement('button', { className: 'px-4 py-1.5 bg-white text-black text-xs font-semibold hover:bg-gray-200 transition-colors' }, 'Build Yours'),
                                React.createElement('button', { className: 'text-white hover:text-gray-300' }, React.createElement(Search, null))
                            )
                        )
                    ),
                    // Main Content
                    React.createElement(
                        'div',
                        { className: 'flex w-full h-full pt-20' },
                        // Left Chat Panel
                        React.createElement(
                            'div',
                            { className: 'w-80 bg-black/40 backdrop-blur-md p-8 flex flex-col overflow-hidden' },
                            // Display Mode Selector
                            React.createElement(
                                'div',
                                { className: 'mb-4 p-3 bg-gray-600/40 rounded border border-gray-400/30' },
                                React.createElement('p', { className: 'text-xs text-gray-300 font-light uppercase mb-2' }, 'Display Mode:'),
                                React.createElement(
                                    'div',
                                    { className: 'flex flex-wrap gap-1' },
                                    ['blur', 'carousel', 'card-highlight', 'animated-focus'].map(mode =>
                                        React.createElement(
                                            'button',
                                            {
                                                key: mode,
                                                onClick: () => setDisplayMode(mode),
                                                className: `px-2 py-1 text-xs rounded transition-all ${
                                                    displayMode === mode
                                                        ? 'bg-red-600 text-white'
                                                        : 'bg-gray-500/40 text-gray-200 hover:bg-gray-500/60'
                                                }`
                                            },
                                            mode.replace('-', ' ').toUpperCase()
                                        )
                                    )
                                )
                            ),
                            // Chat Messages
                            React.createElement(
                                'div',
                                { className: 'flex-1 overflow-y-auto space-y-4 mb-6' },
                                chatMessages.map((msg, idx) =>
                                    React.createElement(
                                        'div',
                                        { key: idx, className: `${msg.role === 'user' ? 'text-right' : 'text-left'}` },
                                        React.createElement(
                                            'div',
                                            { className: `inline-block max-w-xs px-4 py-3 rounded-lg text-sm ${msg.role === 'user' ? 'bg-red-600 text-white' : 'bg-gray-400 text-gray-900'}` },
                                            msg.text
                                        )
                                    )
                                ),
                                isProcessing && React.createElement(
                                    'div',
                                    { className: 'flex gap-2 items-center' },
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce' }),
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce', style: { animationDelay: '0.1s' } }),
                                    React.createElement('div', { className: 'w-2 h-2 bg-gray-400 rounded-full animate-bounce', style: { animationDelay: '0.2s' } })
                                ),
                                React.createElement('div', { ref: chatEndRef })
                            ),
                            // Guidance Prompts
                            !chatMessages.some(m => m.role === 'user') && React.createElement(
                                'div',
                                { className: 'mb-4 space-y-2' },
                                React.createElement('p', { className: 'text-xs text-gray-300 font-light uppercase mb-2' }, 'Or try:'),
                                GUIDANCE_PROMPTS.map((prompt, idx) =>
                                    React.createElement(
                                        'button',
                                        {
                                            key: idx,
                                            onClick: () => handleGuidanceClick(prompt),
                                            disabled: isProcessing || isListening,
                                            className: 'w-full text-left px-3 py-2 bg-gray-400/60 text-gray-900 text-xs rounded hover:bg-gray-400 transition-colors disabled:opacity-50 font-light'
                                        },
                                        prompt.text
                                    )
                                )
                            ),
                            // Transcript Display
                            transcript && React.createElement(
                                'div',
                                { className: 'mb-4 p-3 bg-white/20 rounded text-white text-sm italic' },
                                `"${transcript}"`
                            ),
                            // Mic Button
                            React.createElement(
                                'button',
                                {
                                    onClick: toggleListening,
                                    disabled: isProcessing,
                                    className: `flex items-center justify-center gap-3 w-full px-6 py-4 rounded-lg font-semibold transition-all ${
                                        isListening
                                            ? 'bg-red-600 text-white pulse'
                                            : 'bg-gray-400 text-gray-900 hover:bg-gray-300'
                                    } disabled:opacity-50`
                                },
                                React.createElement(isListening ? Stop : Mic, { className: 'w-5 h-5' }),
                                isListening ? 'Listening...' : 'Click to Speak'
                            )
                        ),
                        // Right Vehicle Showcase
                        React.createElement(
                            'div',
                            { className: 'flex-1 bg-gradient-to-b from-gray-200/50 to-gray-300/50 relative flex items-center justify-center px-16' },
                            React.createElement(
                                'div',
                                { className: 'relative w-full h-96 flex items-end justify-center gap-4' },
                                displayMode === 'carousel'
                                    ? // Carousel Mode: Only show selected vehicles
                                    React.createElement(
                                        'div',
                                        { className: 'flex items-end justify-center gap-6 h-full' },
                                        selectedVehicles.length > 0
                                            ? selectedVehicles.slice(0, 2).map(selectedName =>
                                                VEHICLES.find(v => v.displayName === selectedName)
                                            ).filter(Boolean).map(vehicle =>
                                                React.createElement(
                                                    'div',
                                                    { key: vehicle.id, className: 'flex flex-col items-center animate-fadeIn' },
                                                    React.createElement('div', { className: 'bg-gradient-to-b from-red-400 to-red-600 rounded-full mb-2 shadow-2xl', style: { width: '150px', height: '180px' } }),
                                                    React.createElement('div', { className: 'text-center text-white text-sm font-semibold' }, vehicle.name)
                                                )
                                            )
                                            : React.createElement('div', { className: 'text-gray-400 text-sm' }, 'Select a vehicle to see details')
                                    )
                                    : displayMode === 'card-highlight'
                                    ? // Card Highlight Mode: All visible, recommended highlighted
                                    VEHICLES.map(vehicle =>
                                        React.createElement(
                                            'div',
                                            {
                                                key: vehicle.id,
                                                className: `flex flex-col items-center transition-all duration-300 ${
                                                    selectedVehicles.includes(vehicle.displayName)
                                                        ? 'scale-110 drop-shadow-2xl'
                                                        : 'opacity-60'
                                                }`,
                                            },
                                            React.createElement(
                                                'div',
                                                {
                                                    className: `${vehicle.id <= 3 ? 'bg-red-500' : vehicle.id === 5 ? 'bg-white' : 'bg-gray-400'} rounded-full mb-2 ${
                                                        selectedVehicles.includes(vehicle.displayName)
                                                            ? 'ring-4 ring-yellow-300 shadow-2xl shadow-yellow-300/50'
                                                            : ''
                                                    }`,
                                                    style: { width: vehicle.id <= 3 ? '90px' : vehicle.id <= 4 ? '100px' : vehicle.id <= 6 ? '120px' : '130px', height: '140px' }
                                                }
                                            ),
                                            React.createElement('div', { className: 'text-center text-gray-900 text-xs font-light tracking-wider whitespace-pre-line' }, vehicle.name)
                                        )
                                    )
                                    : displayMode === 'animated-focus'
                                    ? // Animated Focus Mode: All visible, recommended pulsing
                                    VEHICLES.map(vehicle =>
                                        React.createElement(
                                            'div',
                                            {
                                                key: vehicle.id,
                                                className: `flex flex-col items-center transition-all duration-300 ${
                                                    selectedVehicles.includes(vehicle.displayName)
                                                        ? 'animate-pulse'
                                                        : 'opacity-50'
                                                }`,
                                            },
                                            React.createElement(
                                                'div',
                                                {
                                                    className: `${vehicle.id <= 3 ? 'bg-red-500' : vehicle.id === 5 ? 'bg-white' : 'bg-gray-400'} rounded-full mb-2 ${
                                                        selectedVehicles.includes(vehicle.displayName)
                                                            ? 'shadow-2xl shadow-red-500/70 border-4 border-red-400'
                                                            : ''
                                                    }`,
                                                    style: { width: vehicle.id <= 3 ? '90px' : vehicle.id <= 4 ? '100px' : vehicle.id <= 6 ? '120px' : '130px', height: '140px' }
                                                }
                                            ),
                                            React.createElement('div', { className: `text-center text-gray-900 text-xs font-light tracking-wider whitespace-pre-line ${
                                                selectedVehicles.includes(vehicle.displayName) ? 'text-red-600 font-semibold' : ''
                                            }` }, vehicle.name)
                                        )
                                    )
                                    : // Default Blur Mode
                                    VEHICLES.map(vehicle =>
                                        React.createElement(
                                            'div',
                                            {
                                                key: vehicle.id,
                                                className: `flex flex-col items-center transition-all duration-300 ${
                                                    selectedVehicles.length === 0 || selectedVehicles.includes(vehicle.displayName)
                                                        ? 'opacity-100'
                                                        : 'opacity-30 blur-sm'
                                                }`,
                                            },
                                            React.createElement('div', { className: `${vehicle.id <= 3 ? 'bg-red-500' : vehicle.id === 5 ? 'bg-white' : 'bg-gray-400'} rounded-full mb-2`, style: { width: vehicle.id <= 3 ? '90px' : vehicle.id <= 4 ? '100px' : vehicle.id <= 6 ? '120px' : '130px', height: '140px' } }),
                                            React.createElement('div', { className: 'text-center text-gray-900 text-xs font-light tracking-wider whitespace-pre-line' }, vehicle.name)
                                        )
                                    )
                            ),
                            // Info Display
                            selectedVehicles.length > 0 && React.createElement(
                                'div',
                                { className: 'absolute bottom-8 left-8 bg-white/90 backdrop-blur-sm px-6 py-4 rounded text-gray-900 max-w-xs' },
                                React.createElement('p', { className: 'text-sm font-light' },
                                    selectedVehicles.length === 1
                                        ? `${selectedVehicles[0]} - Starting at $${VEHICLES.find(v => v.displayName === selectedVehicles[0])?.price.toLocaleString()}`
                                        : `${selectedVehicles.join(' & ')} - Starting at $${Math.min(...selectedVehicles.map(name => VEHICLES.find(v => v.displayName === name)?.price || 0)).toLocaleString()}`
                                )
                            )
                        )
                    )
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(MazdaShowcase));
        }

        startApp();
    </script>

    <style>
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</body>
</html>
