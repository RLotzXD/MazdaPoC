<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
</head>
<body>
    <div id="app" style="padding: 20px; font-family: Arial;">
        <h1>Testing Voice API</h1>
        <button onclick="testVoice()">Click to Speak</button>
        <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0; min-height: 200px;"></div>
    </div>

    <script>
        function log(msg) {
            const output = document.getElementById('output');
            output.innerHTML += '<p>' + msg + '</p>';
            console.log(msg);
        }

        function testVoice() {
            log('Button clicked!');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                log('ERROR: Speech Recognition not supported');
                return;
            }

            log('Starting voice recognition...');
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            recognition.onstart = () => log('Listening...');
            recognition.onresult = (e) => {
                let text = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        text += e.results[i][0].transcript;
                    }
                }
                if (text) log('You said: ' + text);
            };

            recognition.onend = async () => {
                log('Recording stopped');

                log('Calling API...');
                try {
                    const res = await fetch('/api/gemini', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userInput: 'test' })
                    });

                    const data = await res.json();
                    log('API Response: ' + JSON.stringify(data));
                } catch (err) {
                    log('API Error: ' + err.message);
                }
            };

            recognition.onerror = (e) => log('Speech Error: ' + e.error);
            recognition.start();
        }

        log('Page loaded. Click button to test.');
    </script>
</body>
</html>
